<!DOCTYPE html>
<html>
<head>
  <title>Visual Camera Pose Calibration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 20px; }
    .container { background: #313244; padding: 20px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
    h1, h3 { color: #89b4fa; text-align: center; }
    .top-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    input[type="text"] { padding: 8px; background: #45475a; border: 1px solid #585b70; color: #cdd6f4; border-radius: 4px; }
    button { background: #89b4fa; color: #11111b; font-weight: bold; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
    button:hover { background: #b4befe; }
    button:disabled { background: #585b70; cursor: not-allowed; }
    
    .work-area { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .panel { flex: 1; background: #181825; padding: 10px; border-radius: 8px; min-width: 400px; }
    
    #imageContainer { position: relative; display: inline-block; cursor: crosshair; }
    #deviceImage { max-width: 100%; border: 1px solid #585b70; border-radius: 4px; display: block; }
    .img-marker { position: absolute; width: 8px; height: 8px; background: red; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    
    #map { height: 400px; width: 100%; border: 1px solid #585b70; border-radius: 4px; cursor: crosshair; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #585b70; padding: 8px; text-align: center; }
    th { background: #45475a; }
    
    #status { text-align: center; font-weight: bold; color: #f9e2af; margin-bottom: 10px; }
  </style>
  
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
</head>
<body>
  <div class="container">
    <h1>📷 Visual Pose Calibration</h1>
    <div id="status">Loading OpenCV.js... Please wait.</div>
    
    <div class="top-bar">
      <input type="text" id="deviceId" placeholder="Target Device ID" required>
      <button onclick="fetchDeviceData()">1. Fetch Image & GPS</button>
      <button id="runPnpBtn" disabled onclick="runSolvePnP()" style="background: #a6e3a1;">2. Calculate & Send to Device</button>
    </div>

    <div class="work-area">
      <div class="panel">
        <h3>Camera View (Click to set 2D point)</h3>
        <div id="imageContainer" onclick="handleImageClick(event)">
          <img id="deviceImage" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Waiting...">
        </div>
      </div>
      <div class="panel">
        <h3>Map View (Click to set 3D point)</h3>
        <div id="map"></div>
      </div>
    </div>

    <table id="pointsTable">
      <tr>
        <th>Point #</th>
        <th>Pixel (u, v)</th>
        <th>Local (X, Y, Z)</th>
      </tr>
    </table>
  </div>
  <script src="/calibrateCamera.js"></script>
</body>
</html>
